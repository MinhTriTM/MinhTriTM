      fill: #70a5fd;
    }

    .ct-label .ct-horizontal {
      transform: rotate(-90deg)
    }
    
                
        @keyframes blink {
            from {
                opacity: 0;
                transform:translateX(-20px); 
            }
            to {
                opacity:1;
                transform: translateX(0);
            }
        }
    
                
        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }
    
    
