<svg xmlns="http://www.w3.org/2000/svg" width="495" height="180" viewBox="0 0 495 180">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="495" height="180" rx="10" fill="#1a1b27"/>
  
  <!-- Title -->
  <text x="247.5" y="28" text-anchor="middle" fill="url(#grad3)" font-family="Segoe UI, Ubuntu, Sans-Serif" font-size="16" font-weight="700">
    📊 Repository Overview
  </text>
  
  <!-- Stats Boxes -->
  <!-- Total Repos -->
  <g transform="translate(20, 45)">
    <rect width="140" height="55" rx="8" fill="#2d333b"/>
    <text x="70" y="22" text-anchor="middle" fill="#58a6ff" font-family="Segoe UI, Ubuntu, Sans-Serif" font-size="24" font-weight="700">22</text>
    <text x="70" y="42" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Ubuntu, Sans-Serif" font-size="10">Public Repos</text>
  </g>
  
  <!-- Stars -->
  <g transform="translate(175, 45)">
    <rect width="140" height="55" rx="8" fill="#2d333b"/>
    <text x="70" y="22" text-anchor="middle" fill="#ffa657" font-family="Segoe UI, Ubuntu, Sans-Serif" font-size="24" font-weight="700">29</text>
    <text x="70" y="42" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Ubuntu, Sans-Serif" font-size="10">Total Stars</text>
  </g>
  
  <!-- Followers -->
  <g transform="translate(330, 45)">
    <rect width="140" height="55" rx="8" fill="#2d333b"/>
    <text x="70" y="22" text-anchor="middle" fill="#7ee787" font-family="Segoe UI, Ubuntu, Sans-Serif" font-size="24" font-weight="700">1</text>
    <text x="70" y="42" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Ubuntu, Sans-Serif" font-size="10">Followers</text>
  </g>
  
  <!-- Top Languages -->
  <g transform="translate(20, 115)">
    <rect width="455" height="50" rx="8" fill="#2d333b"/>
    <text x="227.5" y="18" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI, Ubuntu, Sans-Serif" font-size="12" font-weight="600">Top Languages</text>
    <text x="227.5" y="38" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Ubuntu, Sans-Serif" font-size="10">
      Python • TypeScript • JavaScript • C# • Rust • TeX
    </text>
  </g>
